<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'SMS Security Classifier' }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Professional Light Theme Palette */
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent-green: #10b981;
            --border-color: #e2e8f0;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { 
            color: inherit; 
            text-decoration: none; 
        }

        .container { 
            width: min(1200px, 94vw); 
            margin: 0 auto; 
        }

        /* Modern Navigation */
        .nav {
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(12px);
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0;
        }

        .nav-inner {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 12px 0;
        }

        .brand { 
            font-weight: 800; 
            font-size: 1.25rem;
            letter-spacing: -0.02em; 
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .brand span { 
            color: var(--primary); 
            font-weight: 500;
        }

        .nav-links { 
            display: flex; 
            gap: 24px; 
            align-items: center;
        }

        .nav-links a { 
            font-size: 0.9rem; 
            font-weight: 600; 
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .nav-links a:hover { 
            color: var(--primary); 
            background: #f1f5f9;
        }

        /* Active Link Styling (Optional) */
        .nav-links a.active {
            color: var(--primary);
            background: #eef2ff;
        }

        /* Global Layout Components */
        main {
            padding-top: 40px;
            min-height: 80vh;
        }

        /* Footer */
        .footer {
            margin-top: 80px;
            padding: 40px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .footer-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .nav-inner {
                flex-direction: column;
                gap: 16px;
            }
            .nav-links {
                gap: 8px;
            }
            .nav-links a {
                font-size: 0.8rem;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a class="brand" href="/">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                SMS <span>Security Classifier</span>
            </a>
            <div class="nav-links">
                <a href="/">Analyzer</a>
                <a href="/metrics">Metrics</a>
                <a href="/about">Project Details</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-tag">CS190-2P & CS190-3P Final Project</div>
            <p>Flask-based SMS Classification System • Ensemble & Neural Network Analysis</p>
            <p style="margin-top: 8px; opacity: 0.7;">&copy; 2026 SMS Security Lab</p>
        </div>
    </footer>
</body>
</html>
